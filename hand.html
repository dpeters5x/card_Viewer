<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Hand Viewer</title>
  <style>
    :root {
      --toolbar-bg: #2c2c2c;
      --toolbar-fg: #e0e0e0;
      --felt: #1a6b2a;
      --felt-dark: #155a22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #111;
      color: var(--toolbar-fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--toolbar-bg);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid #444;
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      margin-right: 4px;
    }

    a.back-link {
      color: #4a9eff;
      text-decoration: none;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    a.back-link:hover { text-decoration: underline; }

    .sep {
      width: 1px;
      height: 24px;
      background: #555;
      flex-shrink: 0;
    }

    .control {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .control label {
      font-size: 0.82rem;
      color: #aaa;
    }

    .control input[type="range"] {
      width: 120px;
      accent-color: #4a9eff;
      cursor: pointer;
    }

    .control input[type="number"] {
      width: 56px;
      background: #3a3a3a;
      color: var(--toolbar-fg);
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 0.82rem;
      text-align: center;
    }

    .control select {
      background: #3a3a3a;
      color: var(--toolbar-fg);
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .val {
      font-size: 0.78rem;
      color: #bbb;
      min-width: 3em;
    }

    /* ── Canvas ── */
    .canvas-area {
      flex: 1;
      overflow: auto;
      background:
        radial-gradient(ellipse at center, var(--felt) 0%, var(--felt-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* The hand-container is sized precisely to hold all cards */
    .hand-container {
      position: relative;
      /* width/height set by JS */
    }

    /* Each card is absolutely positioned within the container */
    .card-slot {
      position: absolute;
      top: 0;
    }

    .card-slot img {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 5px;
      box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.6);
      /* Prevent dragging the image */
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── Status bar ── */
    .status-bar {
      background: #1c1c1c;
      border-top: 1px solid #333;
      padding: 4px 16px;
      font-size: 0.73rem;
      color: #777;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <h1>Hand Viewer</h1>
    <a class="back-link" href="index.html">← Card Viewer</a>

    <div class="sep"></div>

    <div class="control">
      <label for="cardCount">Cards:</label>
      <input type="number" id="cardCount" min="1" max="13" value="5">
    </div>

    <div class="sep"></div>

    <div class="control">
      <label for="scaleRange">Scale:</label>
      <input type="range" id="scaleRange" min="0.3" max="4" step="0.05" value="1.5">
      <span class="val" id="scaleVal">1.50×</span>
    </div>

    <div class="sep"></div>

    <div class="control">
      <label for="overlapRange">Spread:</label>
      <input type="range" id="overlapRange" min="0" max="1" step="0.01" value="0.60">
      <span class="val" id="overlapVal">0.60</span>
    </div>

    <div class="sep"></div>

    <div class="control">
      <label for="deckSelect">Deck:</label>
      <select id="deckSelect">
        <option value="svg_cards">Deck 1</option>
        <option value="svg_cards2">Deck 2</option>
      </select>
    </div>
  </div>

  <div class="canvas-area">
    <div class="hand-container" id="handContainer"></div>
  </div>

  <div class="status-bar" id="statusBar">Ready</div>

  <script>
    // A representative 13-card "hand" used as the source when count <= 13.
    // Cards are shown left-to-right: first N of this list.
    const SAMPLE_HAND = [
      'AH', '2D', 'TC', 'JH', 'QS',
      'KD', '9H', '3C', '7S', '5D',
      '8H', 'AS', '6C'
    ];

    // Natural card aspect ratio: viewBox 240 × 336  →  5 : 7
    const BASE_W = 72;               // px wide at scale 1×
    const BASE_H = BASE_W * 336 / 240; // px tall at scale 1×  (≈ 100.8)

    const cardCountEl  = document.getElementById('cardCount');
    const scaleRangeEl = document.getElementById('scaleRange');
    const scaleValEl   = document.getElementById('scaleVal');
    const overlapRangeEl = document.getElementById('overlapRange');
    const overlapValEl   = document.getElementById('overlapVal');
    const deckSelectEl = document.getElementById('deckSelect');
    const handContainer = document.getElementById('handContainer');
    const statusBar     = document.getElementById('statusBar');

    function render() {
      const count   = Math.min(Math.max(parseInt(cardCountEl.value, 10) || 1, 1), 13);
      const scale   = parseFloat(scaleRangeEl.value);
      const spread  = parseFloat(overlapRangeEl.value); // 0=stacked, 1=adjacent
      const deck    = deckSelectEl.value;

      const cardW = BASE_W * scale;
      const cardH = BASE_H * scale;

      // Horizontal step between successive card left edges.
      // spread=0 → step=0 (all stacked), spread=1 → step=cardW (fully adjacent)
      const step = spread * cardW;

      // Total bounding box for the hand
      const totalW = count === 1 ? cardW : cardW + (count - 1) * step;
      const totalH = cardH;

      handContainer.style.width  = totalW + 'px';
      handContainer.style.height = totalH + 'px';

      // Rebuild child elements
      handContainer.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const cardCode = SAMPLE_HAND[i];
        const slot = document.createElement('div');
        slot.className = 'card-slot';
        slot.style.left   = (i * step) + 'px';
        slot.style.width  = cardW + 'px';
        slot.style.height = cardH + 'px';
        slot.style.zIndex = i;           // later cards appear on top

        const img = document.createElement('img');
        img.src = `./${deck}/${cardCode}.svg`;
        img.alt = cardCode;
        slot.appendChild(img);
        handContainer.appendChild(slot);
      }

      // Update displayed values
      scaleValEl.textContent   = scale.toFixed(2) + '×';
      overlapValEl.textContent = spread.toFixed(2);

      // Status
      const overlapPct = Math.round((1 - spread) * 100);
      statusBar.textContent =
        `${count} card${count !== 1 ? 's' : ''}  ·  ` +
        `scale ${scale.toFixed(2)}×  ·  ` +
        `${overlapPct}% overlap  ·  ` +
        `deck: ${deck}`;
    }

    cardCountEl.addEventListener('input', render);
    scaleRangeEl.addEventListener('input', render);
    overlapRangeEl.addEventListener('input', render);
    deckSelectEl.addEventListener('change', render);

    render();
  </script>
</body>
</html>
