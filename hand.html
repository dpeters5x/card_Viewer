<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Hand Viewer</title>
  <style>
    :root {
      --toolbar-bg: #2c2c2c;
      --toolbar-fg: #e0e0e0;
      --felt: #1a6b2a;
      --felt-dark: #155a22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #111;
      color: var(--toolbar-fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--toolbar-bg);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid #444;
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      margin-right: 4px;
    }

    a.back-link {
      color: #4a9eff;
      text-decoration: none;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    a.back-link:hover { text-decoration: underline; }

    .sep {
      width: 1px;
      height: 24px;
      background: #555;
      flex-shrink: 0;
    }

    .control {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .control label {
      font-size: 0.82rem;
      color: #aaa;
    }

    .control input[type="range"] {
      width: 120px;
      accent-color: #4a9eff;
      cursor: pointer;
    }

    .control input[type="number"] {
      width: 56px;
      background: #3a3a3a;
      color: var(--toolbar-fg);
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 0.82rem;
      text-align: center;
    }

    .control select {
      background: #3a3a3a;
      color: var(--toolbar-fg);
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .val {
      font-size: 0.78rem;
      color: #bbb;
      min-width: 3em;
    }

    /* ── Layout toggle ── */
    .layout-toggle {
      display: flex;
      border: 1px solid #555;
      border-radius: 4px;
      overflow: hidden;
    }

    .layout-btn {
      background: #3a3a3a;
      color: #aaa;
      border: none;
      padding: 3px 11px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .layout-btn:not(:last-child) {
      border-right: 1px solid #555;
    }

    .layout-btn.active {
      background: #4a9eff;
      color: #fff;
    }

    /* ── Canvas ── */
    .canvas-area {
      flex: 1;
      overflow: auto;
      background:
        radial-gradient(ellipse at center, var(--felt) 0%, var(--felt-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* The hand-container is sized precisely to hold all cards */
    .hand-container {
      position: relative;
      /* width/height set by JS */
    }

    /* Each card is absolutely positioned within the container */
    .card-slot {
      position: absolute;
      top: 0;
    }

    .card-slot img {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 5px;
      box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.6);
      /* Prevent dragging the image */
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── Status bar ── */
    .status-bar {
      background: #1c1c1c;
      border-top: 1px solid #333;
      padding: 4px 16px;
      font-size: 0.73rem;
      color: #777;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <h1>Hand Viewer</h1>
    <a class="back-link" href="index.html">← Card Viewer</a>

    <div class="sep"></div>

    <div class="control">
      <div class="layout-toggle">
        <button class="layout-btn active" id="btnRow">Row</button>
        <button class="layout-btn"        id="btnFan">Fan</button>
      </div>
    </div>

    <div class="sep"></div>

    <div class="control">
      <label for="cardCount">Cards:</label>
      <input type="number" id="cardCount" min="1" max="13" value="5">
    </div>

    <div class="sep"></div>

    <div class="control">
      <label for="scaleRange">Scale:</label>
      <input type="range" id="scaleRange" min="0.3" max="4" step="0.05" value="1.5">
      <span class="val" id="scaleVal">1.50×</span>
    </div>

    <div class="sep"></div>

    <div class="control">
      <label for="overlapRange">Spread:</label>
      <input type="range" id="overlapRange" min="0" max="1" step="0.01" value="0.60">
      <span class="val" id="overlapVal">0.60</span>
    </div>

    <div class="sep"></div>

    <div class="control">
      <label for="deckSelect">Deck:</label>
      <select id="deckSelect">
        <option value="svg_cards">Deck 1</option>
        <option value="svg_cards2">Deck 2</option>
      </select>
    </div>
  </div>

  <div class="canvas-area">
    <div class="hand-container" id="handContainer"></div>
  </div>

  <div class="status-bar" id="statusBar">Ready</div>

  <script>
    // A representative 13-card "hand". First N cards are shown.
    const SAMPLE_HAND = [
      'AH', '2D', 'TC', 'JH', 'QS',
      'KD', '9H', '3C', '7S', '5D',
      '8H', 'AS', '6C'
    ];

    // Natural card aspect ratio: viewBox 240 × 336  →  5 : 7
    const BASE_W = 72;
    const BASE_H = BASE_W * 336 / 240; // ≈ 100.8 px at scale 1×

    // Maximum angular step between adjacent cards (degrees) when spread = 1
    const MAX_ANGLE_PER_CARD = 15;

    // Pivot distance below card bottom, as a multiple of card height
    const PIVOT_FACTOR = 2.5;

    const cardCountEl    = document.getElementById('cardCount');
    const scaleRangeEl   = document.getElementById('scaleRange');
    const scaleValEl     = document.getElementById('scaleVal');
    const overlapRangeEl = document.getElementById('overlapRange');
    const overlapValEl   = document.getElementById('overlapVal');
    const deckSelectEl   = document.getElementById('deckSelect');
    const handContainer  = document.getElementById('handContainer');
    const statusBar      = document.getElementById('statusBar');
    const btnRow         = document.getElementById('btnRow');
    const btnFan         = document.getElementById('btnFan');

    let layout = 'row'; // 'row' | 'fan'

    // ── Layout toggle ──────────────────────────────────────────────
    btnRow.addEventListener('click', () => {
      layout = 'row';
      btnRow.classList.add('active');
      btnFan.classList.remove('active');
      render();
    });

    btnFan.addEventListener('click', () => {
      layout = 'fan';
      btnFan.classList.add('active');
      btnRow.classList.remove('active');
      render();
    });

    // ── Helpers ────────────────────────────────────────────────────
    function makeCardSlot(cardCode, deck, cardW, cardH) {
      const slot = document.createElement('div');
      slot.className = 'card-slot';
      slot.style.width  = cardW + 'px';
      slot.style.height = cardH + 'px';

      const img = document.createElement('img');
      img.src = `./${deck}/${cardCode}.svg`;
      img.alt = cardCode;
      slot.appendChild(img);
      return slot;
    }

    // ── Row layout ─────────────────────────────────────────────────
    function renderRow(count, scale, spread, deck) {
      const cardW = BASE_W * scale;
      const cardH = BASE_H * scale;

      // spread=0 → all stacked; spread=1 → fully adjacent (step = cardW)
      const step   = spread * cardW;
      const totalW = count === 1 ? cardW : cardW + (count - 1) * step;

      handContainer.style.width  = totalW + 'px';
      handContainer.style.height = cardH   + 'px';
      handContainer.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const slot = makeCardSlot(SAMPLE_HAND[i], deck, cardW, cardH);
        slot.style.left   = (i * step) + 'px';
        slot.style.top    = '0px';
        slot.style.zIndex = i;
        handContainer.appendChild(slot);
      }

      const overlapPct = Math.round((1 - spread) * 100);
      return `row  ·  ${overlapPct}% overlap`;
    }

    // ── Fan layout ─────────────────────────────────────────────────
    function renderFan(count, scale, spread, deck) {
      const cardW = BASE_W * scale;
      const cardH = BASE_H * scale;

      // Angular step between adjacent cards (degrees)
      const angleStep = spread * MAX_ANGLE_PER_CARD;

      // Pivot is PIVOT_FACTOR × cardH below the card bottom.
      // Radius is measured from pivot to card centre.
      const pivotDist = PIVOT_FACTOR * cardH;
      const R         = pivotDist + cardH / 2;

      // Half-diagonal of a single card (conservative bounding clearance)
      const halfDiag = Math.hypot(cardW / 2, cardH / 2);
      const pad = 24;

      // Maximum angle from the centre card to either edge card
      const halfSpanDeg = ((count - 1) / 2) * angleStep;
      const halfSpanRad = halfSpanDeg * Math.PI / 180;

      // Container dimensions:
      //   Height — pivot sits at the bottom edge; tallest point is centre-card top
      //   Width  — widest points are the outermost rotated cards
      const containerH = Math.ceil(R + halfDiag + pad);
      const containerW = Math.ceil(2 * (R * Math.sin(halfSpanRad) + halfDiag) + 2 * pad);
      const finalW     = Math.max(containerW, cardW + 2 * pad);

      handContainer.style.width  = finalW     + 'px';
      handContainer.style.height = containerH + 'px';
      handContainer.innerHTML = '';

      // Pivot expressed in container coordinates
      const pivotX = finalW / 2;
      const pivotY = containerH; // at the very bottom of the container

      for (let i = 0; i < count; i++) {
        // Angle for this card (negative = left of centre, positive = right)
        const angleDeg = (i - (count - 1) / 2) * angleStep;
        const angleRad = angleDeg * Math.PI / 180;

        // Card centre on the arc
        const cx = pivotX + R * Math.sin(angleRad);
        const cy = pivotY - R * Math.cos(angleRad);

        const slot = makeCardSlot(SAMPLE_HAND[i], deck, cardW, cardH);
        slot.style.left            = (cx - cardW / 2) + 'px';
        slot.style.top             = (cy - cardH / 2) + 'px';
        slot.style.zIndex          = i;
        slot.style.transform       = `rotate(${angleDeg}deg)`;
        slot.style.transformOrigin = 'center center';
        handContainer.appendChild(slot);
      }

      const totalSpanDeg = (count - 1) * angleStep;
      return `fan  ·  ${totalSpanDeg.toFixed(1)}° total spread`;
    }

    // ── Main render ────────────────────────────────────────────────
    function render() {
      const count  = Math.min(Math.max(parseInt(cardCountEl.value, 10) || 1, 1), 13);
      const scale  = parseFloat(scaleRangeEl.value);
      const spread = parseFloat(overlapRangeEl.value);
      const deck   = deckSelectEl.value;

      scaleValEl.textContent   = scale.toFixed(2) + '×';
      overlapValEl.textContent = spread.toFixed(2);

      const detail = layout === 'fan'
        ? renderFan(count, scale, spread, deck)
        : renderRow(count, scale, spread, deck);

      statusBar.textContent =
        `${count} card${count !== 1 ? 's' : ''}  ·  ` +
        `scale ${scale.toFixed(2)}×  ·  ` +
        `${detail}  ·  ` +
        `deck: ${deck}`;
    }

    cardCountEl.addEventListener('input', render);
    scaleRangeEl.addEventListener('input', render);
    overlapRangeEl.addEventListener('input', render);
    deckSelectEl.addEventListener('change', render);

    render();
  </script>
</body>
</html>
